apiVersion: v1
kind: Namespace
metadata:
  name: llm-inference
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vllm-router
  namespace: llm-inference
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vllm-router-pod-reader
  namespace: llm-inference
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vllm-router-pod-reader
  namespace: llm-inference
subjects:
- kind: ServiceAccount
  name: vllm-router
  namespace: llm-inference
roleRef:
  kind: Role
  name: vllm-router-pod-reader
  apiGroup: rbac.authorization.k8s.io
