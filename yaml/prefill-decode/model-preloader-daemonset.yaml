apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: model-preloader
  namespace: llm-inference
  labels:
    app: model-preloader
spec:
  selector:
    matchLabels:
      app: model-preloader
  template:
    metadata:
      labels:
        app: model-preloader
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.present
                operator: In
                values:
                - "true"
      initContainers:
      - name: model-puller
        image: minio/mc:RELEASE.2025-08-13T08-35-41Z
        env:
        - name: MINIO_ENDPOINT
          value: "http://minio.minio.svc.cluster.local:9000"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_SECRET_KEY
        command:
        - sh
        - -c
        - |
          set -e

          # 配置 MinIO 别名
          mc alias set models $MINIO_ENDPOINT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY

          MODEL_DIR=/data/models/Qwen3-0.6B
          READY_FILE=$MODEL_DIR/.ready

          # ========== 幂等性检查：已存在则跳过 ==========
          if [ -f "$READY_FILE" ]; then
            echo "[$(date)] 模型已存在于 HostPath，跳过下载。"
            echo "[$(date)] 本地大小: $(du -sh $MODEL_DIR | cut -f1)"
            echo "[$(date)] 文件列表:"
            ls -lh $MODEL_DIR/*.safetensors 2>/dev/null | head -5
            exit 0
          fi

          echo "[$(date)] 首次同步：从 MinIO 下载 llm-models/Qwen3-06b ..."
          mkdir -p $MODEL_DIR

          # 从 MinIO 增量同步到 HostPath 挂载路径
          mc mirror --overwrite --remove \
            models/llm-models/Qwen3-0.6B/ \
            $MODEL_DIR/

          # 写入就绪标志（关键：后续重建秒级跳过）
          touch $READY_FILE
          echo "[$(date)] 同步完成。总大小: $(du -sh $MODEL_DIR | cut -f1)"

          # 关键文件校验
          for FILE in config.json tokenizer.json; do
            if [ ! -f "$MODEL_DIR/$FILE" ]; then
              echo "[$(date)] 关键文件缺失: $FILE"
              exit 1
            fi
          done
          echo "[$(date)] 关键文件校验通过"
        volumeMounts:
        - name: host-model-cache
          mountPath: /data/models
        resources:
          limits:
            memory: "2Gi"
            cpu: "2"
          requests:
            memory: "512Mi"
            cpu: "500m"
      containers:
      # Preloader 完成下载后，由 pause 容器保持 Pod Running
      - name: pause
        image: registry.k8s.io/pause:3.9
        resources:
          limits:
            memory: "64Mi"
            cpu: "100m"
      volumes:
      - name: host-model-cache
        hostPath:
          path: /data/models
          type: DirectoryOrCreate
